<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#F4511E">
<title>Cookie Cutters - Staff Schedule</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;500;700&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(180deg,#FFF9F0 0%,#FFF 40%);min-height:100vh;max-width:480px;margin:0 auto;-webkit-tap-highlight-color:transparent}
.hd{background:linear-gradient(135deg,#FF8A65,#FF7043 50%,#F4511E);padding:16px 16px 20px;border-radius:0 0 24px 24px;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,0.1);border-radius:50%}
.cd{background:#FFF;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06);border:1px solid #F5E6D3}
.btn{border:none;border-radius:12px;padding:12px 20px;font-family:'DM Sans';font-weight:600;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s}
.bp{background:linear-gradient(135deg,#FF7043,#F4511E);color:white}
.bp:active{transform:scale(0.97)}
.bs{background:#FFF3E0;color:#E65100;border:1px solid #FFB74D}
.bsm{padding:6px 14px;font-size:12px;border-radius:8px}
.bap{background:#E8F5E9;color:#2E7D32;border:1px solid #81C784}
.bdn{background:#FFEBEE;color:#C62828;border:1px solid #E57373}
.nv{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#FFF;border-top:1px solid #F0E0D0;display:flex;justify-content:space-around;padding:8px 0 env(safe-area-inset-bottom,14px);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.06)}
.nv button{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'DM Sans';font-size:10px;font-weight:500;color:#9E9E9E;padding:4px 8px}
.nv button.a{color:#F4511E}
.nv button .ni{font-size:22px}
.st{font-family:'Fredoka';font-weight:600;font-size:18px;color:#4E342E;margin-bottom:14px}
.sa{padding:16px 16px 80px}
.tst{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#4E342E;color:white;padding:12px 24px;border-radius:14px;font-family:'DM Sans';font-size:14px;font-weight:500;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,0.2);animation:sd 0.3s ease}
@keyframes sd{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.gw{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px;padding:0 16px 4px}
.sg{display:grid;grid-template-columns:90px repeat(7,minmax(50px,1fr));min-width:520px;border-radius:14px;overflow:hidden;border:1.5px solid #EDE0D4;background:#FFF;box-shadow:0 2px 16px rgba(0,0,0,0.05)}
.gc{background:#FAF4ED;padding:10px 6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#BCAAA4;text-transform:uppercase;letter-spacing:1px;border-bottom:1.5px solid #EDE0D4;border-right:1.5px solid #EDE0D4}
.gdh{padding:8px 2px;text-align:center;border-bottom:1.5px solid #EDE0D4;border-right:1px solid #F5EDE3;background:#FAF4ED}
.gdh.td{background:#FFF3E0}
.gdh.cc{background:#FFEBEE}
.gsc{padding:8px 6px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #F5EDE3;border-right:1.5px solid #EDE0D4;background:#FFFDF9;min-height:56px}
.gshc{padding:3px 2px;border-bottom:1px solid #F5EDE3;border-right:1px solid #F5EDE3;display:flex;align-items:center;justify-content:center;min-height:56px;cursor:pointer;transition:all 0.15s}
.gshc:active{background:#FFF3E0}
.gshc.td{background:#FFFCF5}
.gshc.ccl{background:#FFF5F5}
.sp{border-radius:7px;padding:4px 3px;text-align:center;font-size:9px;font-weight:600;line-height:1.3;width:100%;min-height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform 0.15s}
.sp:active{transform:scale(0.95)}
.off{font-size:10px;color:#D7CCC8;font-weight:500;font-style:italic}
.ea{width:100%;height:38px;border:2px dashed #E8D5C4;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#BCAAA4;font-size:16px;cursor:pointer;background:transparent}
.ea:active{border-color:#FF7043;color:#FF7043;background:#FFF3E0}
.wn{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.wnb{background:#FFF3E0;border:1px solid #FFE0B2;border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#E65100;font-family:'DM Sans'}
.lgd{width:8px;height:8px;border-radius:50%;display:inline-block}
.mb{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border:1px solid #FFB74D;border-radius:6px;padding:2px 8px;font-size:9px;font-weight:700;color:#E65100;text-transform:uppercase}
.eh{background:linear-gradient(135deg,#E3F2FD,#E8EAF6);border:1px solid #BBDEFB;border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:12px;color:#1565C0;line-height:1.5}
.hrc{font-size:10px;font-weight:700;color:#E65100;font-family:'Fredoka';text-align:center;padding:4px 2px;border-bottom:1px solid #F5EDE3;border-right:1px solid #F5EDE3;display:flex;align-items:center;justify-content:center;min-height:32px;background:#FFF9F0}
.hrl{font-size:9px;font-weight:700;color:#8D6E63;text-transform:uppercase;background:#FAF4ED;padding:6px;border-bottom:1px solid #EDE0D4;border-right:1.5px solid #EDE0D4;display:flex;align-items:center;justify-content:center}
.ct{background:#FFCDD2;color:#C62828;font-size:7px;font-weight:700;border-radius:4px;padding:1px 4px;text-transform:uppercase}
.bt{background:#FFE0B2;color:#E65100;font-size:7px;font-weight:700;border-radius:4px;padding:1px 4px;text-transform:uppercase}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:white;border-radius:20px;padding:24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.2);max-height:90vh;overflow-y:auto}
.ff{width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid #E8D5C4;font-family:'DM Sans';font-size:14px;background:#FFFDF9;color:#4E342E;outline:none}
.ff:focus{border-color:#FF7043;box-shadow:0 0 0 3px rgba(255,112,67,0.12)}
.pb{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}
.pb-s{background:#E3F2FD;color:#1565C0;border:1px solid #90CAF9}
.pb-r{background:#F3E5F5;color:#7B1FA2;border:1px solid #CE93D8}
.pt{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans';border:1.5px solid #E8D5C4;background:#FFFDF9;color:#6D4C41}
.pt.on{background:#E3F2FD;color:#1565C0;border-color:#90CAF9}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px}
.loading h1{font-family:'Fredoka';font-size:24px;color:#F4511E;font-weight:700}
.loading p{color:#8D6E63;font-size:14px}
</style>
</head>
<body>
<div id="app"><div class="loading"><h1>Cookie Cutters ✂️</h1><p>Connecting to your schedule...</p></div></div>

<script>
// ===== CONFIG =====
const API = window.location.origin; // Same domain as API
let DEV_USER_ID = new URLSearchParams(window.location.search).get('user') || 102;

const COLORS = ["#FF7043","#42A5F5","#66BB6A","#AB47BC","#FFA726","#EC407A","#26A69A","#5C6BC0","#EF5350","#8D6E63"];
const getColor = id => COLORS[(Number(id)||0) % COLORS.length];

const TOPTS = [];
for(let h=6;h<=21;h++) for(let m=0;m<60;m+=10){
  const hr=h>12?h-12:h===0?12:h;
  TOPTS.push(`${hr}:${String(m).padStart(2,'0')}${h>=12?'p':'a'}`);
}

const apiToApp = t => {if(!t)return'';const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return t;return`${parseInt(m[1])}:${m[2]}${m[3].toLowerCase().charAt(0)}`};
const appTo24 = t => {const[time,p]=t.split(/(?=[ap])/);let[h,mn]=time.split(':').map(Number);if(p==='p'&&h!==12)h+=12;if(p==='a'&&h===12)h=0;return`${String(h).padStart(2,'0')}:${String(mn||0).padStart(2,'0')}:00`};
const pT = t => {const[time,p]=t.split(/(?=[ap])/);let[h,m]=time.split(':').map(Number);if(p==='p'&&h!==12)h+=12;if(p==='a'&&h===12)h=0;return h+(m||0)/60};
const fmtHrs = h => {const hrs=Math.floor(h);const mins=Math.round((h-hrs)*60);return mins>0?`${hrs}h${mins}m`:`${hrs}h`};
const dk = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const fd = d => d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const fday = d => d.toLocaleDateString('en-US',{weekday:'short'});
const wsf = (date,off) => {const d=new Date(date);d.setDate(d.getDate()-d.getDay()+1+off*7);return d};
const wdays = s => {const a=[];for(let i=0;i<7;i++){const d=new Date(s);d.setDate(d.getDate()+i);a.push(d)}return a};
const isTd = d => {const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate()};

const RC = {
  Stylist:{bg:'linear-gradient(135deg,#E3F2FD,#BBDEFB)',color:'#1565C0',border:'#90CAF9'},
  Receptionist:{bg:'linear-gradient(135deg,#F3E5F5,#E1BEE7)',color:'#6A1B9A',border:'#CE93D8'}
};

async function apiFetch(path, opts={}){
  const url = `${API}${path}${path.includes('?')?'&':'?'}dev_user_id=${DEV_USER_ID}`;
  const res = await fetch(url, {headers:{'Content-Type':'application/json','x-dev-user-id':String(DEV_USER_ID),...opts.headers},...opts});
  if(!res.ok){const e=await res.json().catch(()=>({detail:res.statusText}));throw new Error(e.detail||'API error')}
  return res.json();
}

// ===== APP STATE =====
let state = {
  view:'schedule', wkOff:0, mLoc:'All', curUser:null,
  users:[], shifts:{}, templates:[], torList:[], closedDates:[], blackoutDates:[], locations:[], announcements:[],
  businessHours:[], schedulingRules:[], loginLog:[],
  modal:null, toast:null, showReqForm:false, showClosedForm:null, showTplForm:false, showAnnouncementForm:false,
  showRuleForm:false, showHoursEdit:null,
  reqForm:{startDate:'',endDate:'',reason:''},
  editUser:null, userForm:{firstName:'',lastName:'',positions:['Stylist'],location_id:''},
  confirmDel:null, dateForm:{date:'',startDate:'',endDate:'',label:''},
  tplForm:{name:'',start:'9:00a',end:'5:00p'}, editTpl:null,
  announcementForm:{title:'',body:''},
  ruleForm:{rule_type:'MAX_CONSECUTIVE_DAYS',rule_name:'',rule_description:'',param_1:'',param_2:'',user_id:''},
  editRule:null,
  generating:false, draftBatchId:null, draftShifts:[],
};

function setState(updates){ Object.assign(state, updates); render(); }
function toast(msg){ setState({toast:msg}); setTimeout(()=>setState({toast:null}), 3000); }

// ===== DATA LOADING =====
async function loadAll(){
  try{
    const users = await apiFetch('/api/scheduling/users');
    const me = users.find(u=>u.user_id==DEV_USER_ID);
    const locs = [...new Map(users.map(u=>[u.location_id,{id:u.location_id,name:u.location_name}])).values()];
    const [tpls,tor,closed,bo,ann,bh,rules] = await Promise.all([
      apiFetch('/api/scheduling/templates').catch(()=>[]),
      apiFetch('/api/scheduling/time-off').catch(()=>[]),
      apiFetch('/api/scheduling/admin/closed-dates').catch(()=>[]),
      apiFetch('/api/scheduling/admin/blackout-periods').catch(()=>[]),
      apiFetch('/api/scheduling/admin/announcements').catch(()=>[]),
      apiFetch('/api/scheduling/admin/business-hours').catch(()=>[]),
      apiFetch('/api/scheduling/admin/scheduling-rules').catch(()=>[]),
    ]);
    setState({users,curUser:me,locations:locs,templates:tpls,torList:tor,closedDates:closed,blackoutDates:bo,announcements:ann,businessHours:bh,schedulingRules:rules});
    // Log this login
    const dt = /Mobi|Android/i.test(navigator.userAgent) ? 'mobile' : 'desktop';
    apiFetch('/api/scheduling/admin/log-login',{method:'POST',body:JSON.stringify({user_agent:navigator.userAgent,device_type:dt,ip:''})}).catch(()=>{});
  }catch(e){document.getElementById('app').innerHTML=`<div class="loading"><h1>Cookie Cutters ✂️</h1><p style="color:#C62828">Connection error: ${e.message}</p><p style="font-size:12px;color:#8D6E63">Make sure the API server is running</p></div>`}
}

async function loadShifts(){
  try{
    const ws = wsf(new Date(), state.wkOff);
    const data = await apiFetch(`/api/scheduling/shifts?week_start=${dk(ws)}`);
    const map = {};
    data.forEach(s=>{map[`${s.user_id}-${s.shift_date}`]={shift_id:s.shift_id,start:apiToApp(s.start_time),end:apiToApp(s.end_time),role:s.position_name,loc:s.location_name==='Fort Worth'?'FW':'ARL',hours:s.hours_scheduled}});
    setState({shifts:map});
  }catch(e){console.error(e)}
}

// ===== API ACTIONS =====
async function saveShift(userId,dateStr,data,locationId){
  const posMap={Stylist:1,Receptionist:2};
  const ex=state.shifts[`${userId}-${dateStr}`];
  try{
    if(ex?.shift_id) await apiFetch(`/api/scheduling/shifts/${ex.shift_id}`,{method:'PUT',body:JSON.stringify({start_time:appTo24(data.start),end_time:appTo24(data.end),position_id:posMap[data.role]||1})});
    else await apiFetch('/api/scheduling/shifts',{method:'POST',body:JSON.stringify({user_id:userId,location_id:locationId,shift_date:dateStr,start_time:appTo24(data.start),end_time:appTo24(data.end),position_id:posMap[data.role]||1})});
    setState({modal:null}); await loadShifts(); toast('Shift saved!');
  }catch(e){toast(e.message)}
}

async function deleteShift(userId,dateStr){
  const ex=state.shifts[`${userId}-${dateStr}`];
  if(!ex?.shift_id)return;
  try{await apiFetch(`/api/scheduling/shifts/${ex.shift_id}`,{method:'DELETE'});setState({modal:null});await loadShifts();toast('Shift removed')}catch(e){toast(e.message)}
}

async function submitTOR(){
  const f=state.reqForm;if(!f.startDate||!f.reason){toast('Fill required fields');return}
  try{await apiFetch('/api/scheduling/time-off',{method:'POST',body:JSON.stringify({start_date:f.startDate,end_date:f.endDate||f.startDate,reason:f.reason})});setState({showReqForm:false,reqForm:{startDate:'',endDate:'',reason:''}});await loadAll();toast('Submitted!')}catch(e){toast(e.message)}
}

async function reviewTOR(id,status){
  try{await apiFetch(`/api/scheduling/time-off/${id}`,{method:'PUT',body:JSON.stringify({status})});await loadAll();toast(`${status}!`)}catch(e){toast(e.message)}
}

async function saveUser(){
  const f=state.userForm;if(!f.firstName||!f.lastName){toast('Enter name');return}
  try{
    if(state.editUser==='new') await apiFetch('/api/scheduling/users',{method:'POST',body:JSON.stringify({first_name:f.firstName,last_name:f.lastName,positions:f.positions,location_id:f.location_id})});
    else await apiFetch(`/api/scheduling/users/${state.editUser.user_id}`,{method:'PUT',body:JSON.stringify({first_name:f.firstName,last_name:f.lastName,positions:f.positions,location_id:f.location_id})});
    setState({editUser:null});await loadAll();toast('Saved!')
  }catch(e){toast(e.message)}
}

async function removeUser(uid){try{await apiFetch(`/api/scheduling/users/${uid}`,{method:'DELETE'});setState({confirmDel:null});await loadAll();toast('Removed')}catch(e){toast(e.message)}}

async function saveTpl(){
  const f=state.tplForm;if(!f.name){toast('Enter name');return}
  try{
    if(state.editTpl) await apiFetch(`/api/scheduling/templates/${state.editTpl.template_id}`,{method:'PUT',body:JSON.stringify({template_name:f.name,start_time:appTo24(f.start),end_time:appTo24(f.end)})});
    else await apiFetch('/api/scheduling/templates',{method:'POST',body:JSON.stringify({template_name:f.name,start_time:appTo24(f.start),end_time:appTo24(f.end)})});
    setState({showTplForm:false,editTpl:null});await loadAll();toast('Saved!')
  }catch(e){toast(e.message)}
}

async function deleteTpl(id){try{await apiFetch(`/api/scheduling/templates/${id}`,{method:'DELETE'});await loadAll();toast('Removed')}catch(e){toast(e.message)}}
async function addClosedDate(){const f=state.dateForm;if(!f.date||!f.label)return;try{await apiFetch('/api/scheduling/admin/closed-dates',{method:'POST',body:JSON.stringify({closed_date:f.date,label:f.label})});setState({showClosedForm:null});await loadAll();toast('Added!')}catch(e){toast(e.message)}}
async function addBlackout(){const f=state.dateForm;if(!f.startDate||!f.endDate||!f.label)return;try{await apiFetch('/api/scheduling/admin/blackout-periods',{method:'POST',body:JSON.stringify({start_date:f.startDate,end_date:f.endDate,label:f.label})});setState({showClosedForm:null});await loadAll();toast('Added!')}catch(e){toast(e.message)}}
async function removeClosedDate(id){try{await apiFetch(`/api/scheduling/admin/closed-dates/${id}`,{method:'DELETE'});await loadAll();toast('Removed')}catch(e){toast(e.message)}}
async function removeBlackout(id){try{await apiFetch(`/api/scheduling/admin/blackout-periods/${id}`,{method:'DELETE'});await loadAll();toast('Removed')}catch(e){toast(e.message)}}

async function addAnnouncement(){
  const f=state.announcementForm;if(!f.title||!f.body){toast('Fill in title and message');return}
  try{await apiFetch('/api/scheduling/admin/announcements',{method:'POST',body:JSON.stringify({title:f.title,body:f.body})});setState({showAnnouncementForm:false,announcementForm:{title:'',body:''}});await loadAll();toast('Announcement posted!')}catch(e){toast(e.message)}
}
async function removeAnnouncement(id){try{await apiFetch(`/api/scheduling/admin/announcements/${id}`,{method:'DELETE'});await loadAll();toast('Removed')}catch(e){toast(e.message)}}

// Scheduling Rules
async function saveRule(){
  const f=state.ruleForm;if(!f.rule_name||!f.rule_type){toast('Fill in name and type');return}
  try{
    if(state.editRule) await apiFetch(`/api/scheduling/admin/scheduling-rules/${state.editRule.RULE_ID}`,{method:'PUT',body:JSON.stringify({rule_name:f.rule_name,rule_description:f.rule_description,param_1:f.param_1,param_2:f.param_2})});
    else await apiFetch('/api/scheduling/admin/scheduling-rules',{method:'POST',body:JSON.stringify(f)});
    setState({showRuleForm:false,editRule:null});await loadAll();toast('Rule saved!')
  }catch(e){toast(e.message)}
}
async function removeRule(id){try{await apiFetch(`/api/scheduling/admin/scheduling-rules/${id}`,{method:'DELETE'});await loadAll();toast('Removed')}catch(e){toast(e.message)}}

// Business Hours
async function updateHours(hoursId,data){
  try{await apiFetch(`/api/scheduling/admin/business-hours/${hoursId}`,{method:'PUT',body:JSON.stringify(data)});await loadAll();toast('Hours updated!')}catch(e){toast(e.message)}
}

// Login Log
async function loadLoginLog(){
  try{const data=await apiFetch('/api/scheduling/admin/login-log');setState({loginLog:data})}catch(e){console.error(e)}
}

// Auto-scheduler
async function generateSchedule(locationId, month, year){
  setState({generating:true});
  try{
    const result = await apiFetch('/api/scheduling/auto-generate',{method:'POST',body:JSON.stringify({location_id:locationId,month:parseInt(month),year:parseInt(year)})});
    const drafts = await apiFetch(`/api/scheduling/drafts/${result.batch_id}`);
    setState({generating:false,draftBatchId:result.batch_id,draftShifts:drafts});
    toast(`Generated ${result.shifts_generated} shifts!`);
  }catch(e){setState({generating:false});toast(e.message)}
}

async function approveDraft(){
  if(!state.draftBatchId)return;
  try{
    const result = await apiFetch(`/api/scheduling/drafts/${state.draftBatchId}/approve`,{method:'POST'});
    setState({draftBatchId:null,draftShifts:[]});
    toast(`Approved ${result.shifts_created} shifts!`);
    await loadShifts();
  }catch(e){toast(e.message)}
}

async function discardDraft(){
  if(!state.draftBatchId)return;
  try{
    await apiFetch(`/api/scheduling/drafts/${state.draftBatchId}`,{method:'DELETE'});
    setState({draftBatchId:null,draftShifts:[]});
    toast('Draft discarded');
  }catch(e){toast(e.message)}
}

// ===== RENDER =====
function render(){
  const s=state;const u=s.curUser;if(!u)return;
  const isM=u.is_manager;
  const EDITORS=[201,301,102,2]; // Chad, Heather, Marinna FW, Marinna ARL
  const canEdit=EDITORS.includes(u.user_id);
  const vLoc=isM?s.mLoc:u.location_name;
  const vUsers=s.users.filter(x=>{
    // Show user in grid if they have positions (even if manager)
    if(x.positions.length===0) return false; // owners without positions don't show
    if(vLoc==='All') return true;
    return x.location_name===vLoc;
  });
  const TODAY=new Date();const ws=wsf(TODAY,s.wkOff);const wd=wdays(ws);

      s.templates.forEach(t=>{html+=`<div class="cd" style="padding:14px;display:flex;justify-content:space-between"><div><div style="font-size:14px;font-weight:700;color:#4E342E">${t.template_name}</div><div style="font-size:13px;color:#8D6E63;margin-top:2px">${apiToApp(t.start_time)} – ${apiToApp(t.end_time)} · ${fmtHrs(t.hours_scheduled)}</div></div><div style="display:flex;gap:6px"><button onclick="setState({editTpl:state.templates.find(x=>x.template_id===${t.template_id}),tplForm:{name:'${t.template_name}',start:'${apiToApp(t.start_time)}',end:'${apiToApp(t.end_time)}'},showTplForm:true})" style="background:#FFF3E0;border:1px solid #FFE0B2;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer">✏️</button><button onclick="deleteTpl(${t.template_id})" style="background:#FFEBEE;border:1px solid #FFCDD2;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer">🗑️</button></div></div>`});

      // ===== BUSINESS HOURS =====
      html+=`<div class="st" style="margin-top:22px">🏪 Business Hours</div>`;
      const filteredBH = vLoc==='All' ? s.businessHours : s.businessHours.filter(h=>h.LOCATION_NAME===vLoc);
      const bhLocs = [...new Set(filteredBH.map(h=>h.LOCATION_NAME))];
      bhLocs.forEach(locName=>{
        if(vLoc==='All') html+=`<div style="font-size:14px;font-weight:700;color:#4E342E;margin-bottom:8px;margin-top:12px">${locName}</div>`;
        const locHours=filteredBH.filter(h=>h.LOCATION_NAME===locName).sort((a,b)=>a.DAY_OF_WEEK-b.DAY_OF_WEEK);
        locHours.forEach(h=>{
          const openT=h.OPEN_TIME||'Closed';const closeT=h.CLOSE_TIME||'';
          html+=`<div class="cd" style="padding:12px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:600;color:${h.IS_OPEN?'#4E342E':'#BCAAA4'}">${h.DAY_NAME}</div></div><div style="display:flex;align-items:center;gap:8px">${h.IS_OPEN?`<span style="font-size:13px;color:#6D4C41">${openT} – ${closeT}</span>`:'<span style="font-size:12px;color:#BCAAA4;font-style:italic">Closed</span>'}<button onclick="setState({showHoursEdit:state.showHoursEdit===${h.HOURS_ID}?null:${h.HOURS_ID}})" style="background:#FFF3E0;border:1px solid #FFE0B2;border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px">✏️</button></div></div>`;
          if(s.showHoursEdit===h.HOURS_ID){
            html+=`<div class="cd" style="border-color:#FF7043;border-width:2px;padding:14px;margin-top:-10px"><div style="display:flex;gap:8px;margin-bottom:10px"><div style="flex:1"><label style="font-size:11px;font-weight:600;color:#8D6E63;display:block;margin-bottom:4px">Open</label><input type="time" class="ff" value="${h.OPEN_TIME?h.OPEN_TIME.replace(/ AM| PM/i,''):'10:00'}" onchange="updateHours(${h.HOURS_ID},{open_time:this.value+':00'})"></div><div style="flex:1"><label style="font-size:11px;font-weight:600;color:#8D6E63;display:block;margin-bottom:4px">Close</label><input type="time" class="ff" value="${h.CLOSE_TIME?h.CLOSE_TIME.replace(/ AM| PM/i,''):'18:00'}" onchange="updateHours(${h.HOURS_ID},{close_time:this.value+':00'})"></div></div><div style="display:flex;gap:8px"><button class="btn bsm ${h.IS_OPEN?'bp':'bs'}" onclick="updateHours(${h.HOURS_ID},{is_open:${!h.IS_OPEN}})">${h.IS_OPEN?'Mark Closed':'Mark Open'}</button><button class="btn bs bsm" onclick="setState({showHoursEdit:null})">Done</button></div></div>`;
          }
        });
      });

      // ===== SCHEDULING RULES =====
      html+=`<div style="display:flex;justify-content:space-between;margin-top:22px;margin-bottom:12px"><div class="st" style="margin-bottom:0">📋 Scheduling Rules</div><button class="btn bp bsm" onclick="setState({showRuleForm:true,editRule:null,ruleForm:{rule_type:'MAX_CONSECUTIVE_DAYS',rule_name:'',rule_description:'',param_1:'',param_2:'',user_id:''}})">+ Add</button></div>`;
      html+=`<div style="font-size:12px;color:#8D6E63;margin-bottom:12px;line-height:1.5">These rules guide the auto-scheduler when generating schedules.</div>`;

      if(s.showRuleForm){
        const rf=s.ruleForm;
        const ruleTypes=[{v:'MAX_CONSECUTIVE_DAYS',l:'Max Consecutive Days',p1:'Max days',p2:''},{v:'WEEKLY_HOURS_RANGE',l:'Weekly Hours Range',p1:'Min hours',p2:'Max hours'},{v:'WEEKEND_OFF_PER_MONTH',l:'Weekend Days Off / Month',p1:'Saturdays off',p2:'Sundays off'},{v:'SHIFT_START_OFFSET',l:'Shift Start Offset',p1:'Minutes (negative=before)',p2:''},{v:'CUSTOM',l:'Custom Rule',p1:'Value',p2:'Value 2'}];
        html+=`<div class="cd" style="border-color:#FF7043;border-width:2px;margin-bottom:14px"><div style="display:flex;flex-direction:column;gap:10px">`;
        html+=`<select class="ff" onchange="setState({ruleForm:{...state.ruleForm,rule_type:this.value}})">${ruleTypes.map(t=>`<option value="${t.v}" ${rf.rule_type===t.v?'selected':''}>${t.l}</option>`).join('')}</select>`;
        html+=`<input class="ff" placeholder="Rule name" value="${rf.rule_name}" oninput="setState({ruleForm:{...state.ruleForm,rule_name:this.value}})">`;
        html+=`<input class="ff" placeholder="Description" value="${rf.rule_description}" oninput="setState({ruleForm:{...state.ruleForm,rule_description:this.value}})">`;
        html+=`<div style="display:flex;gap:8px"><input class="ff" placeholder="Value 1" value="${rf.param_1}" oninput="setState({ruleForm:{...state.ruleForm,param_1:this.value}})"><input class="ff" placeholder="Value 2 (optional)" value="${rf.param_2}" oninput="setState({ruleForm:{...state.ruleForm,param_2:this.value}})"></div>`;
        html+=`<select class="ff" onchange="setState({ruleForm:{...state.ruleForm,user_id:this.value||null}})"><option value="">Applies to: All employees</option>${s.users.filter(x=>x.positions.length>0).map(x=>`<option value="${x.user_id}" ${String(rf.user_id)===String(x.user_id)?'selected':''}>${x.display_name}</option>`).join('')}</select>`;
        html+=`<div style="display:flex;gap:8px"><button class="btn bp bsm" style="flex:1;justify-content:center" onclick="saveRule()">${s.editRule?'Save':'Add Rule'}</button><button class="btn bs bsm" onclick="setState({showRuleForm:false,editRule:null})">Cancel</button></div>`;
        html+=`</div></div>`;
      }

      const rTypeLabels={MAX_CONSECUTIVE_DAYS:'⏱️ Max Days',WEEKLY_HOURS_RANGE:'📊 Hours',WEEKEND_OFF_PER_MONTH:'🗓️ Weekend',SHIFT_START_OFFSET:'🕐 Offset',CUSTOM:'📝 Custom'};
      const filteredRules = vLoc==='All' ? s.schedulingRules : s.schedulingRules.filter(r=>!r.LOCATION_ID||r.LOCATION_NAME===vLoc);
      filteredRules.forEach(r=>{
        html+=`<div class="cd" style="padding:14px;display:flex;justify-content:space-between"><div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:#1565C0;background:#E3F2FD;padding:2px 8px;border-radius:8px;font-weight:600">${rTypeLabels[r.RULE_TYPE]||r.RULE_TYPE}</span>${r.USER_NAME?`<span style="font-size:11px;color:#7B1FA2;background:#F3E5F5;padding:2px 8px;border-radius:8px;font-weight:600">${r.USER_NAME}</span>`:''}</div><div style="font-size:14px;font-weight:700;color:#4E342E;margin-top:6px">${r.RULE_NAME}</div>${r.RULE_DESCRIPTION?`<div style="font-size:12px;color:#8D6E63;margin-top:2px">${r.RULE_DESCRIPTION}</div>`:''}<div style="font-size:11px;color:#BCAAA4;margin-top:4px">${r.PARAM_1?'Value: '+r.PARAM_1:''}${r.PARAM_2?' – '+r.PARAM_2:''}</div></div><button onclick="removeRule(${r.RULE_ID})" style="background:none;border:none;font-size:16px;color:#E57373;cursor:pointer;flex-shrink:0">✕</button></div>`;
      });
      if(filteredRules.length===0) html+=`<div style="text-align:center;padding:20px;color:#BCAAA4;font-size:13px">No rules yet. Add rules to guide the auto-scheduler.</div>`;

      // ===== AUTO-SCHEDULE GENERATOR =====
      html+=`<div style="margin-top:22px;margin-bottom:12px"><div class="st" style="margin-bottom:4px">🤖 Auto-Schedule Generator</div><div style="font-size:12px;color:#8D6E63;margin-bottom:12px;line-height:1.5">Use AI to generate an optimized monthly schedule based on historical data, demand patterns, and scheduling rules.</div></div>`;

      if(s.draftBatchId && s.draftShifts.length>0){
        // Show draft review
        html+=`<div class="cd" style="background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border:2px solid #81C784;padding:18px"><div style="font-family:'Fredoka';font-weight:600;font-size:16px;color:#2E7D32;margin-bottom:4px">📋 Draft Schedule Ready</div><div style="font-size:13px;color:#4E342E;margin-bottom:14px">${s.draftShifts.length} shifts generated for the month</div>`;

        // Group by week
        const weeks={};
        s.draftShifts.forEach(d=>{
          const dt=new Date(d.SHIFT_DATE+'T12:00');
          const mon=new Date(dt);mon.setDate(mon.getDate()-((mon.getDay()+6)%7)); // Get Monday
          const wk=dk(mon);
          if(!weeks[wk]) weeks[wk]={start:mon,days:{}};
          const dayKey=d.SHIFT_DATE;
          if(!weeks[wk].days[dayKey]) weeks[wk].days[dayKey]={staff:[],totalHrs:0,date:dt};
          weeks[wk].days[dayKey].staff.push(d);
          weeks[wk].days[dayKey].totalHrs+=(d.HOURS_SCHEDULED||0);
        });

        const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        Object.entries(weeks).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([wk,wkData],wi)=>{
          const wkStart=wkData.start;
          const wkEnd=new Date(wkStart);wkEnd.setDate(wkEnd.getDate()+6);
          const wkLabel=`${wkStart.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${wkEnd.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
          let wkTotalHrs=0;let wkTotalShifts=0;

          html+=`<div style="margin-top:${wi>0?'16px':'6px'};margin-bottom:8px;font-family:'Fredoka';font-weight:600;font-size:14px;color:#2E7D32">Week: ${wkLabel}</div>`;

          // Day-by-day grid
          const allDays=[];
          for(let i=0;i<7;i++){const d=new Date(wkStart);d.setDate(d.getDate()+i);allDays.push(d)}

          allDays.forEach(day=>{
            const dayData=wkData.days[dk(day)];
            if(!dayData) return;
            const staffCount=dayData.staff.length;
            const stylists=dayData.staff.filter(s=>s.POSITION_NAME==='Stylist').length;
            const receptionists=dayData.staff.filter(s=>s.POSITION_NAME==='Receptionist').length;
            wkTotalHrs+=dayData.totalHrs;
            wkTotalShifts+=staffCount;

            html+=`<div style="background:rgba(255,255,255,0.7);border-radius:10px;padding:10px 12px;margin-bottom:4px;border:1px solid rgba(46,125,50,0.15)">`;
            html+=`<div style="display:flex;justify-content:space-between;align-items:center">`;
            html+=`<div><span style="font-size:13px;font-weight:700;color:#2E7D32">${dayNames[day.getDay()]} ${day.getDate()}</span>`;
            html+=`<span style="font-size:11px;color:#66BB6A;margin-left:8px">${staffCount} staff</span></div>`;
            html+=`<div style="display:flex;gap:6px;align-items:center">`;
            if(stylists>0) html+=`<span style="background:#E3F2FD;color:#1565C0;padding:2px 6px;border-radius:6px;font-size:10px;font-weight:600">${stylists} Stylist${stylists>1?'s':''}</span>`;
            if(receptionists>0) html+=`<span style="background:#F3E5F5;color:#7B1FA2;padding:2px 6px;border-radius:6px;font-size:10px;font-weight:600">${receptionists} Rec</span>`;
            html+=`<span style="font-size:11px;font-weight:700;color:#2E7D32">${fmtHrs(dayData.totalHrs)}</span>`;
            html+=`</div></div>`;

            // Show who's working
            html+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">`;
            dayData.staff.sort((a,b)=>a.DISPLAY_NAME.localeCompare(b.DISPLAY_NAME)).forEach(s=>{
              const isRec=s.POSITION_NAME==='Receptionist';
              html+=`<span style="background:${isRec?'#F3E5F5':'#E3F2FD'};color:${isRec?'#7B1FA2':'#1565C0'};padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600">${s.DISPLAY_NAME}</span>`;
            });
            html+=`</div></div>`;
          });

          // Week summary
          html+=`<div style="display:flex;justify-content:flex-end;padding:4px 0;margin-bottom:2px"><span style="font-size:12px;font-weight:700;color:#1B5E20">Week total: ${wkTotalShifts} shifts · ${fmtHrs(wkTotalHrs)}</span></div>`;
        });

        // Employee monthly summary (compact)
        html+=`<div style="margin-top:14px;padding-top:12px;border-top:2px solid rgba(46,125,50,0.2)"><div style="font-size:12px;font-weight:700;color:#2E7D32;margin-bottom:8px">📊 Employee Monthly Summary</div>`;
        const byEmp={};
        s.draftShifts.forEach(d=>{
          if(!byEmp[d.DISPLAY_NAME]) byEmp[d.DISPLAY_NAME]={shifts:0,hours:0,positions:new Set(),weeklyHrs:{}};
          byEmp[d.DISPLAY_NAME].shifts++;
          byEmp[d.DISPLAY_NAME].hours+=d.HOURS_SCHEDULED||0;
          byEmp[d.DISPLAY_NAME].positions.add(d.POSITION_NAME);
          const dt=new Date(d.SHIFT_DATE+'T12:00');
          const wkNum=Math.ceil(dt.getDate()/7);
          if(!byEmp[d.DISPLAY_NAME].weeklyHrs[wkNum]) byEmp[d.DISPLAY_NAME].weeklyHrs[wkNum]=0;
          byEmp[d.DISPLAY_NAME].weeklyHrs[wkNum]+=(d.HOURS_SCHEDULED||0);
        });
        Object.entries(byEmp).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([name,info])=>{
          const avgWeekly=info.hours/Object.keys(info.weeklyHrs).length;
          const inRange=avgWeekly>=34&&avgWeekly<=38;
          html+=`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(46,125,50,0.1)"><div><span style="font-size:12px;font-weight:600;color:#2E7D32">${name}</span></div><div style="text-align:right"><span style="font-size:11px;color:#4E342E">${info.shifts} shifts</span><span style="font-size:11px;font-weight:700;margin-left:8px;color:${inRange?'#2E7D32':'#E65100'}">~${fmtHrs(avgWeekly)}/wk</span></div></div>`;
        });
        html+=`</div>`;

        html+=`<div style="display:flex;gap:8px;margin-top:14px"><button class="btn bp" style="flex:1;justify-content:center" onclick="approveDraft()">✅ Approve & Publish</button><button class="btn bdn" style="flex:1;justify-content:center" onclick="discardDraft()">❌ Discard</button></div>`;
        html+=`</div>`;
      } else {
        // Show generation form
        const nextMonth = new Date();nextMonth.setMonth(nextMonth.getMonth()+1);
        const defMonth = nextMonth.getMonth()+1;
        const defYear = nextMonth.getFullYear();
        const selLoc = vLoc!=='All' ? s.locations.find(l=>l.name===vLoc) : s.locations[0];

        html+=`<div class="cd" style="border:2px solid #FF7043;background:linear-gradient(135deg,#FFF3E0,#FFE8D5)">`;
        html+=`<div style="display:flex;gap:8px;margin-bottom:12px"><div style="flex:1"><label style="font-size:11px;font-weight:600;color:#8D6E63;display:block;margin-bottom:4px">Month</label><select id="ag-month" class="ff">${[['1','January'],['2','February'],['3','March'],['4','April'],['5','May'],['6','June'],['7','July'],['8','August'],['9','September'],['10','October'],['11','November'],['12','December']].map(m=>`<option value="${m[0]}" ${parseInt(m[0])===defMonth?'selected':''}>${m[1]}</option>`).join('')}</select></div><div style="flex:1"><label style="font-size:11px;font-weight:600;color:#8D6E63;display:block;margin-bottom:4px">Year</label><select id="ag-year" class="ff"><option value="2026" ${defYear===2026?'selected':''}>2026</option><option value="2027" ${defYear===2027?'selected':''}>2027</option></select></div></div>`;
        if(vLoc==='All'){
          html+=`<div style="margin-bottom:12px"><label style="font-size:11px;font-weight:600;color:#8D6E63;display:block;margin-bottom:4px">Location</label><select id="ag-loc" class="ff">${s.locations.map(l=>`<option value="${l.id}">${l.name}</option>`).join('')}</select></div>`;
        }
        html+=`<button class="btn bp" style="width:100%;justify-content:center;padding:14px;font-size:16px" onclick="const m=document.getElementById('ag-month').value;const y=document.getElementById('ag-year').value;const l=${vLoc!=='All'?`'${selLoc?.id||''}'`:`document.getElementById('ag-loc').value`};generateSchedule(l,m,y)" ${s.generating?'disabled':''}>`;
        html+=s.generating?'<span style="animation:spin 1s linear infinite;display:inline-block">⚡</span> Generating... (this may take a minute)':'🤖 Generate Schedule';
        html+=`</button></div>`;
      }

      // ===== LOGIN ACTIVITY =====
      html+=`<div style="display:flex;justify-content:space-between;margin-top:22px;margin-bottom:12px"><div class="st" style="margin-bottom:0">👁️ Login Activity</div><button class="btn bs bsm" onclick="loadLoginLog()">Refresh</button></div>`;
      if(s.loginLog.length>0){
        s.loginLog.slice(0,10).forEach(l=>{
          const dt=new Date(l.login_at);
          html+=`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F5EDE3"><div><span style="font-size:13px;font-weight:600;color:#4E342E">${l.display_name||'Unknown'}</span><span style="font-size:11px;color:#BCAAA4;margin-left:8px">${l.device_type||''}</span></div><span style="font-size:11px;color:#8D6E63">${dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})} ${dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</span></div>`;
        });
      } else {
        html+=`<div style="text-align:center;padding:16px;color:#BCAAA4;font-size:12px">Click Refresh to load login activity</div>`;
      }
    }
    html+=`<div style="text-align:center;margin-top:24px;padding-bottom:20px"><div style="font-family:'Fredoka';font-size:16px;color:#E65100;font-weight:600">Cookie Cutters ✂️</div><div style="font-size:11px;color:#BCAAA4;margin-top:4px">Staff App v1.0 · Live</div></div>`;
  }

  html+='</div>';

  // Nav
  const tabs=[{id:'home',icon:'🏠',label:'Home'},{id:'schedule',icon:'📅',label:'Schedule'},{id:'timeoff',icon:'🌴',label:'Time Off'}];
  if(canEdit) tabs.push({id:'team',icon:'👥',label:'Team'});
  tabs.push({id:'more',icon:'⚙️',label:'Admin'});
  html+=`<div class="nv">${tabs.map(t=>`<button class="${s.view===t.id?'a':''}" onclick="setState({view:'${t.id}'})"><span class="ni">${t.icon}</span>${t.label}</button>`).join('')}</div>`;

  // Modal
  if(s.modal) html+=renderModal();

  document.getElementById('app').innerHTML = html;
}

function renderLS(){
  return `<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:#8D6E63;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px">Location</div><select onchange="setState({mLoc:this.value})" style="width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid #FFB74D;background:#FFF8F0;font-family:'DM Sans';font-size:14px;font-weight:600;color:#E65100;outline:none;cursor:pointer"><option value="All" ${state.mLoc==='All'?'selected':''}>All Locations</option>${state.locations.map(l=>`<option value="${l.name}" ${state.mLoc===l.name?'selected':''}>${l.name}</option>`).join('')}</select></div>`;
}

function renderUserForm(){
  const f=state.userForm;
  return `<div class="cd" style="border-color:#FF7043;border-width:2px;margin-bottom:18px"><div style="display:flex;flex-direction:column;gap:12px"><div style="display:flex;gap:10px"><input class="ff" placeholder="First" value="${f.firstName}" oninput="setState({userForm:{...state.userForm,firstName:this.value}})"><input class="ff" placeholder="Last" value="${f.lastName}" oninput="setState({userForm:{...state.userForm,lastName:this.value}})"></div><div style="display:flex;gap:8px">${['Stylist','Receptionist'].map(p=>`<button class="pt ${f.positions.includes(p)?'on':''}" onclick="togglePos('${p}')">${f.positions.includes(p)?'✓ ':''}${p}</button>`).join('')}</div><select class="ff" onchange="setState({userForm:{...state.userForm,location_id:this.value}})">${state.locations.map(l=>`<option value="${l.id}" ${f.location_id===l.id?'selected':''}>${l.name}</option>`).join('')}</select><div style="display:flex;gap:8px"><button class="btn bp" style="flex:1;justify-content:center" onclick="saveUser()">${state.editUser==='new'?'Add':'Save'}</button><button class="btn bs" onclick="setState({editUser:null})">Cancel</button></div></div></div>`;
}

function togglePos(pos){
  const has=state.userForm.positions.includes(pos);
  const next=has?state.userForm.positions.filter(p=>p!==pos):[...state.userForm.positions,pos];
  if(next.length) setState({userForm:{...state.userForm,positions:next}});
}

function renderTplForm(){
  const f=state.tplForm;
  const opts=TOPTS.map(t=>`<option value="${t}" ${f.start===t?'selected':''}>${t}</option>`).join('');
  const opts2=TOPTS.map(t=>`<option value="${t}" ${f.end===t?'selected':''}>${t}</option>`).join('');
  return `<div class="cd" style="border-color:#FF7043;border-width:2px;margin-bottom:14px"><div style="display:flex;flex-direction:column;gap:10px"><input class="ff" placeholder="Shift name" value="${f.name}" oninput="setState({tplForm:{...state.tplForm,name:this.value}})"><div style="display:flex;gap:8px"><select class="ff" style="flex:1" onchange="setState({tplForm:{...state.tplForm,start:this.value}})">${opts}</select><select class="ff" style="flex:1" onchange="setState({tplForm:{...state.tplForm,end:this.value}})">${opts2}</select></div><div style="display:flex;gap:8px"><button class="btn bp bsm" style="flex:1;justify-content:center" onclick="saveTpl()">${state.editTpl?'Save':'Create'}</button><button class="btn bs bsm" onclick="setState({showTplForm:false,editTpl:null})">Cancel</button></div></div></div>`;
}

function openModal(mode,userId,dayKey,dayLabel,stylistName,positions,locationId){
  if(typeof positions==='string') positions=JSON.parse(positions);
  const shift = state.shifts[`${userId}-${dayKey}`]||null;
  setState({modal:{mode,userId,dayKey,dayLabel,stylistName,positions,locationId,shift}});
}

function renderModal(){
  const m=state.modal;if(!m)return'';
  const shift=m.shift;
  const start=shift?.start||'9:50a';const end=shift?.end||'6:00p';const role=shift?.role||m.positions[0]||'Stylist';
  const tpls=state.templates;

  let h=`<div class="modal-bg" onclick="setState({modal:null})"><div class="modal" onclick="event.stopPropagation()">`;
  h+=`<div style="display:flex;justify-content:space-between;margin-bottom:18px"><div style="font-family:'Fredoka';font-weight:600;font-size:18px;color:#4E342E">${m.mode==='add'?'Add Shift':'Edit Shift'}</div><button onclick="setState({modal:null})" style="background:none;border:none;font-size:20px;color:#BCAAA4;cursor:pointer">✕</button></div>`;
  h+=`<div style="background:#FFF9F0;border-radius:12px;padding:12px;margin-bottom:16px"><div style="font-size:13px;font-weight:700;color:#4E342E">${m.stylistName}</div><div style="font-size:12px;color:#8D6E63;margin-top:2px">📅 ${m.dayLabel}</div></div>`;

  // Role
  h+=`<div style="margin-bottom:14px"><label style="font-size:12px;font-weight:600;color:#8D6E63;display:block;margin-bottom:6px">Role</label><div style="display:flex;gap:8px" id="modal-roles">`;
  m.positions.forEach(pos=>{h+=`<button class="pt ${role===pos?'on':''}" onclick="document.querySelectorAll('#modal-roles .pt').forEach(b=>b.classList.remove('on'));this.classList.add('on');window._modalRole='${pos}'">${pos}</button>`});
  h+=`</div></div>`;

  // Templates
  if(m.mode==='add'&&tpls.length>0){
    h+=`<div style="margin-bottom:14px"><label style="font-size:12px;font-weight:600;color:#8D6E63;display:block;margin-bottom:6px">Pre-defined Shifts</label>`;
    tpls.forEach(t=>{h+=`<button style="display:block;width:100%;padding:12px 14px;border-radius:12px;text-align:left;cursor:pointer;font-family:'DM Sans';font-size:13px;font-weight:600;background:#FFFDF9;border:1.5px solid #E8D5C4;color:#4E342E;margin-bottom:6px" onclick="window._modalStart='${apiToApp(t.start_time)}';window._modalEnd='${apiToApp(t.end_time)}';document.getElementById('m-start').value='${apiToApp(t.start_time)}';document.getElementById('m-end').value='${apiToApp(t.end_time)}';this.style.borderColor='#FF7043';this.style.background='#FFF3E0'">${t.template_name} <span style="float:right;color:#BCAAA4">${apiToApp(t.start_time)}–${apiToApp(t.end_time)}</span></button>`});
    h+=`</div>`;
  }

  // Custom time
  h+=`<div style="margin-bottom:14px"><label style="font-size:12px;font-weight:600;color:#8D6E63;display:block;margin-bottom:6px">${m.mode==='add'?'Or custom time':'Time'}</label><div style="display:flex;gap:8px"><select id="m-start" class="ff" style="flex:1" onchange="window._modalStart=this.value">${TOPTS.map(t=>`<option ${t===start?'selected':''}>${t}</option>`).join('')}</select><select id="m-end" class="ff" style="flex:1" onchange="window._modalEnd=this.value">${TOPTS.map(t=>`<option ${t===end?'selected':''}>${t}</option>`).join('')}</select></div></div>`;

  // Buttons
  h+=`<div style="display:flex;gap:8px"><button class="btn bp" style="flex:1;justify-content:center" onclick="saveShift(${m.userId},'${m.dayKey}',{start:window._modalStart||'${start}',end:window._modalEnd||'${end}',role:window._modalRole||'${role}'},'${m.locationId}')">${m.mode==='add'?'Add Shift':'Save'}</button>`;
  if(m.mode==='edit') h+=`<button class="btn bsm bdn" onclick="deleteShift(${m.userId},'${m.dayKey}')">Delete</button>`;
  h+=`</div></div></div>`;
  return h;
}

// Init
window._modalStart='';window._modalEnd='';window._modalRole='';
loadAll().then(()=>loadShifts());
</script>
</body>
</html>
